<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Muse Mirror</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: white;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #settings-icon {
      position: fixed;
      top: 20px;
      right: 20px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 1s;
      font-size: 24px;
    }
    #settings-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(255,255,255,0.95);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    input, button {
      margin: 5px;
      padding: 10px;
      font-size: 16px;
    }
    #fixed-center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 800px;
    }
    #input-line {
      display: flex;
      align-items: center;
    }
    #displayed-text {
      font-size: 20px;
      font-weight: 300;
      letter-spacing: -0.01em;
      color: #333;
      white-space: pre;
    }
    #cursor {
      display: inline-block;
      width: 2px;
      height: 24px;
      background-color: #333;
      animation: breathe 4.5s infinite ease-in-out;
      margin-left: 1px;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
    #hidden-input {
      position: absolute;
      opacity: 0;
      height: 0;
      width: 0;
    }
    #conversation {
      max-height: 45vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column-reverse;
    }
    .conversation-item {
      margin-bottom: 10px;
      font-size: 20px;
      font-weight: 300;
    }
    .user-text { color: #333; }
    .response-text { color: #666; opacity: 0; animation: fadeIn 2s forwards; }
    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body>
  <div id="settings-icon">•••</div>
  <div id="settings-modal">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="signUp()">Sign Up</button>
    <button onclick="signIn()">Sign In</button>
    <button onclick="subscribePremium()">Subscribe Premium ($5)</button>
    <button onclick="logout()">Sign Out</button>
    <div id="auth-message"></div>
  </div>
  <div id="fixed-center">
    <div id="conversation"></div>
    <div id="input-line">
      <span id="displayed-text"></span>
      <span id="cursor"></span>
      <input type="text" id="hidden-input" autocomplete="off" />
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBaIUFWW8wm0qWnz_LlFd0sECpaKav3YjaE",
      authDomain: "muse-mirror-bfc94.firebaseapp.com",
      projectId: "muse-mirror-bfc94",
      storageBucket: "muse-mirror-bfc94.appspot.com",
      messagingSenderId: "642869976281",
      appId: "1:642869976281:web:d17bccca98cd62362db2c8"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const stripe = Stripe("pk_test_51RKsC3RLBoNQf97bMRwplx9fLVOb9rOW0DW8DEXtdlJHidcFA68vvsJKGrJVil4Ug0VApK1Fk5QhQmVcSOCrjXwC00n3kZb0Ts");

    const settingsIcon = document.getElementById('settings-icon');
    const settingsModal = document.getElementById('settings-modal');
    const cursor = document.getElementById('cursor');
    const hiddenInput = document.getElementById('hidden-input');
    const displayedText = document.getElementById('displayed-text');
    const conversation = document.getElementById('conversation');
    let messageCount = 0;
    let exchangeCount = 0;
    let isPremium = false;

    settingsIcon.onclick = () => settingsModal.style.display = 'flex';

    auth.onAuthStateChanged(async user => {
      if (user) {
        const doc = await db.collection('users').doc(user.uid).get();
        const data = doc.data();
        isPremium = data.subscription === 'premium';
        console.log('Signed in:', user.email, '| Premium:', isPremium);
      } else {
        isPremium = false;
        console.log('Not signed in');
      }
    });

    function signUp() {
      auth.createUserWithEmailAndPassword(email.value, password.value).then(user => {
        db.collection('users').doc(user.user.uid).set({ subscription: 'free', exchangesToday: 0 });
        authMessage('Signed up');
      }).catch(err => authMessage(err.message));
    }

    function signIn() {
      auth.signInWithEmailAndPassword(email.value, password.value)
        .then(() => authMessage('Signed in'))
        .catch(err => authMessage(err.message));
    }

    function logout() {
      auth.signOut().then(() => authMessage('Signed out'));
    }

    function authMessage(msg) {
      document.getElementById('auth-message').innerText = msg;
      setTimeout(() => document.getElementById('auth-message').innerText = '', 3000);
    }

    async function subscribePremium() {
      const uid = auth.currentUser.uid;
      const res = await fetch('/api/create-checkout-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uid })
      });
      const data = await res.json();
      stripe.redirectToCheckout({ sessionId: data.sessionId });
    }

    function getTodayKey() {
      return new Date().toISOString().slice(0, 10);
    }

    function getLocalExchangeCount() {
      const saved = JSON.parse(localStorage.getItem('guestExchange') || '{}');
      if (saved.date !== getTodayKey()) return 0;
      return saved.count || 0;
    }

    function incrementLocalExchange() {
      const count = getLocalExchangeCount() + 1;
      localStorage.setItem('guestExchange', JSON.stringify({ date: getTodayKey(), count }));
    }

    hiddenInput.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter' && hiddenInput.value.trim() !== '') {
        if (messageCount >= 8) return;
        if (!isPremium && exchangeCount >= 4) {
          alert("That's all the light I've got for now.");
          return;
        }

        const text = hiddenInput.value.trim();
        const userItem = document.createElement('div');
        userItem.className = 'conversation-item user-text';
        userItem.textContent = text;
        conversation.prepend(userItem);
        displayedText.textContent = '';
        hiddenInput.value = '';
        messageCount++;

        setTimeout(async () => {
          const reply = document.createElement('div');
          reply.className = 'conversation-item response-text';
          reply.textContent = '...';
          conversation.prepend(reply);
          messageCount++;

          if (messageCount >= 8) {
            exchangeCount++;
            messageCount = 0;
            if (!auth.currentUser) incrementLocalExchange();
          }
        }, 500);
      }
    });

    window.onload = () => {
      hiddenInput.focus();
      if (getLocalExchangeCount() >= 4) alert("That's all the light I've got for now.");
      setTimeout(() => settingsIcon.style.opacity = 1, 2000);
    };
  </script>
</body>
</html>
